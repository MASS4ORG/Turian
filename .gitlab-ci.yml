# Turian Engine — GitLab CI/CD  (GitLab provider plugin)
#
# Provider split
# ─────────────────────────────────────────────────────────────────────────────
# Job scripts stay thin so the pipeline ports to other CI providers (GitHub
# Actions, Forgejo, Gitea, local runs); the logic lives in the release tool:
#
# tools/ci/Release.zig              Subcommand dispatcher
#   └─ ci/*.zig             Provider-agnostic logic (verify, version bump,
#                                  CHANGELOG, cut/tag/push, packaging, cache
#                                  pruning)
#   └─ ci/GitLab.zig     GitLab plugin (push URL, Package Registry
#                                  upload, Release API — JSON built in Zig,
#                                  no jq)
#
# Stages
# ─────────────────────────────────────────────────────────────────────────────
#   .pre     — Dockerfile/version changes only: rebuild+push the CI image
#   test     — every push/MR:  build + unit tests + example regression
#   check    — schedule only:  version bump, CHANGELOG, git tag, create release
#   build    — tag trigger:    parallel per-platform compilation + upload + link
#
# CI image
# ─────────────────────────────────────────────────────────────────────────────
# Every job below runs on `$CI_REGISTRY_IMAGE/ci:$ZIG_VERSION` (built from the
# root `Dockerfile` by `build_ci_image`) instead of installing Zig + apt packages
# from scratch on every job. There's no ready-made image that both bundles Zig
# and has a shell (e.g. kassany/ziglang has neither `sh` nor `bash`, which
# GitLab's executor needs), so we build our own — it's still Ubuntu-based, just
# with Zig preinstalled, and only rebuilds when the Dockerfile or ZIG_VERSION
# actually changes.
#
# Requirements:
#   1. Push credentials for `check_release` — pick one:
#      a. CI_JOB_TOKEN (default, no setup): auto-issued per job, never needs
#         rotation. Acts as the pipeline-schedule owner, so that user must be
#         a Maintainer with push rights on branch `main` and tag `v*.*.*`
#         (see #2 below). This is what runs unless CI_PUSH_TOKEN is set.
#      b. CI_PUSH_TOKEN (Project Variable): project access token, scopes
#         'write_repository' + 'api'. GitLab.com requires an expiry on all
#         tokens (no "never expires" option) — max ~365 days — so this needs
#         periodic rotation. Prefer (a) unless something needs a real PAT.
#   2. Protected Branches/Tags (Settings -> Repository):
#      - Branch 'main': Allowed to push = Maintainers (or the schedule owner)
#      - Tag pattern 'v*.*.*' and 'v*.*.*-*' (pre-releases): same
#   3. Container Registry enabled for this project (Settings -> General ->
#      Visibility -> Container Registry), for the CI image above.

variables:
  ZIG_VERSION: "0.16.0"

default:
  image: "${CI_REGISTRY_IMAGE}/ci:${ZIG_VERSION}"
  tags:
    - local-runner

stages:
  - test
  - check
  - build

# ── build_ci_image ────────────────────────────────────────────────────────────
# Rebuilds+pushes the shared CI image. Runs in `.pre` (always first, no need to
# list it in `stages:`) so a Dockerfile/version bump is ready before any other
# job tries to pull it. Kaniko builds from within a container with no Docker
# daemon required (no dind, no privileged runner).
build_ci_image:
  stage: .pre
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
      changes:
        - Dockerfile
        - .gitlab-ci.yml
    # Manual escape hatch: lets a feature branch build+push the image (e.g. to
    # bootstrap it the very first time, before it exists in the registry, or
    # to try out a Dockerfile change ahead of merging).
    - when: manual
      allow_failure: true
  script:
    - mkdir -p /kaniko/.docker
    - |
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --build-arg "ZIG_VERSION=${ZIG_VERSION}"
      --destination "${CI_REGISTRY_IMAGE}/ci:${ZIG_VERSION}"
      --cache=true

# ── test ─────────────────────────────────────────────────────────────────────
test:
  stage: test
  rules:
    - if: "$CI_COMMIT_TAG"
      when: never
    - if: "$CHECK_RELEASE"
      when: never
    - if: '$CI_COMMIT_MESSAGE =~ /^chore\(release\):/'
      when: never
    - when: on_success
  script:
    - zig fmt --check .
    - echo "==> zig build"
    - zig build --summary all
    - echo "==> zig build test"
    - zig build test --summary all
    - echo "==> zig build (windows cross-compile, full studio + cli)"
    # Build the whole Studio (not just -Dcli-only) so a Windows regression in
    # the GUI/GPU/render stack is caught here. -Dno-test: the Linux runner
    # can't execute the Windows binaries.
    - zig build -Dtarget=x86_64-windows-gnu -Dno-test --summary all
    - echo "==> example project regression"
    - zig build release-verify -- --examples
    - |
      # Free disk space before the SDK build: the debug bins and .zig-cache from
      # previous steps are no longer needed (examples already tested the CLI).
      # This does mean the saved zig-cache-* cache is empty from this job — it's
      # kept warm by check_release/build_artifacts runs instead.
      rm -rf .zig-cache zig-out/bin/turian-studio zig-out/bin/turian-cli
      find examples/ -maxdepth 2 -name '.cache' -type d -exec rm -rf {} + 2>/dev/null || true
      df -h / || true
    # SDK smoke-test: verify the CLI in the SDK can build a project using only
    # SDK-resident sources. Uses the full SDK (with SDL3) so the game can link.
    - zig build sdk --summary all
    - zig build release-verify -- --sdk
    # Bounds the shared global cache's growth (Zig has no built-in cache GC).
    - zig build release-prune-cache -- --days 14
  cache:
    # Zig's global cache (fetched build.zig.zon dependencies, the compiler's
    # own cache) isn't branch-specific, so it's shared by every branch under
    # one fixed key instead of being rebuilt per-ref.
    - key: zig-global-cache-v1
      paths: [~/.cache/zig/]
    # The incremental project build cache is per-branch, but a branch/MR that
    # doesn't have one yet (e.g. freshly created) falls back to the default
    # branch's cache instead of starting fully cold.
    - key: zig-cache-${CI_COMMIT_REF_SLUG}
      fallback_keys: ["zig-cache-${CI_DEFAULT_BRANCH}"]
      paths: [.zig-cache/]
  artifacts:
    paths: [zig-out/bin/turian-studio, zig-out/bin/turian-cli]
    expire_in: 1 day

# ── check_release ─────────────────────────────────────────────────────────────
# Runs on schedule.  Bumps the version, updates CHANGELOG, commits, tags, and creates the GitLab release.
check_release:
  stage: check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: "$CHECK_RELEASE"
  script:
    # Whole flow (git identity + authenticated remote, tag prune, collect
    # commits since last tag, version bump + CHANGELOG, commit, tag, push,
    # create release) lives in tools/ci/Cut.zig. Push auth:
    # CI_PUSH_TOKEN > CI_JOB_TOKEN (see Requirements above).
    - zig build release-cut -- --provider gitlab
  cache:
    - key: zig-global-cache-v1
      paths: [~/.cache/zig/]
    # Runs off the default branch, so it shares (and warms) the same project
    # build cache as `test`'s default-branch runs.
    - key: zig-cache-${CI_DEFAULT_BRANCH}
      paths: [.zig-cache/]

# ── build_artifacts ───────────────────────────────────────────────────────────
# Runs in parallel for each platform when a tag is pushed.
# Builds, packages, and UPLOADS the artifact directly to the release.
build_artifacts:
  stage: build
  rules:
    - if: "$CI_COMMIT_TAG"
  parallel:
    matrix:
      - PLATFORM: linux-x86_64
        BUILD_FLAGS: "-Doptimize=ReleaseFast"
      - PLATFORM: windows-x86_64
        BUILD_FLAGS: "-Dtarget=x86_64-windows-gnu -Dno-test -Doptimize=ReleaseFast"
      - PLATFORM: macos-aarch64
        BUILD_FLAGS: "-Dtarget=aarch64-macos -Dcli-only -Dno-test -Doptimize=ReleaseFast"
  script:
    # 1. Build binaries + tests
    - zig build ci $BUILD_FLAGS
    # 2. Assemble self-contained SDK in zig-out/sdk/
    - zig build sdk $BUILD_FLAGS
    # 3. Package SDK into .public/
    - zig build release-package -- --platform $PLATFORM --version $CI_COMMIT_TAG
    # 4. Upload and link to release
    - zig build release-publish -- --provider gitlab
    # Bounds the shared global cache's growth.
    - zig build release-prune-cache -- --days 14
  cache:
    - key: zig-global-cache-v1
      paths: [~/.cache/zig/]
    # Keyed per platform: the 3 matrix jobs cross-compile different targets
    # and must not share (and thrash) one another's build cache.
    - key: zig-cache-release-${PLATFORM}
      fallback_keys: ["zig-cache-${CI_DEFAULT_BRANCH}"]
      paths: [.zig-cache/]
